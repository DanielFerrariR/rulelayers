# https://lefthook.dev/
# When `{staged_files}` is in `run`, lefthook skips the command if nothing matches.
# Do not wrap with `if [ -n "{staged_files}" ]` — multiple files expand to
# separately quoted args and break `[` ("too many arguments").
pre-commit:
  parallel: true
  commands:
    oxlint:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
    oxfmt:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc,md}"
      exclude:
        - package.json
        - pnpm-lock.yaml
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      # Avoid parallel auto-install races on node_modules/.bin (pnpm 11 verifyDepsBeforeRun).
      run: PNPM_CONFIG_VERIFY_DEPS_BEFORE_RUN=false pnpm run typecheck
    knip:
      run: PNPM_CONFIG_VERIFY_DEPS_BEFORE_RUN=false pnpm run knip
