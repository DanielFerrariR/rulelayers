# https://lefthook.dev/
pre-commit:
  parallel: true
  commands:
    oxlint:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs}"
      run: |
        if [ -n "{staged_files}" ]; then
          pnpm exec oxlint --fix {staged_files}
        fi
      stage_fixed: true
    oxfmt:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc,md}"
      exclude:
        - package.json
        - pnpm-lock.yaml
      run: |
        if [ -n "{staged_files}" ]; then
          pnpm exec oxfmt {staged_files}
        fi
      stage_fixed: true

pre-push:
  parallel: true
  # Skip PTY allocation — fails with "device not configured" when macOS PTYs are exhausted.
  follow: true
  commands:
    typecheck:
      # Avoid parallel auto-install races on node_modules/.bin (pnpm 11 verifyDepsBeforeRun).
      run: PNPM_CONFIG_VERIFY_DEPS_BEFORE_RUN=false pnpm run typecheck
    knip:
      run: PNPM_CONFIG_VERIFY_DEPS_BEFORE_RUN=false pnpm run knip
