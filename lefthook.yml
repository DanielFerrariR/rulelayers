# https://lefthook.dev/
pre-commit:
  parallel: true
  commands:
    oxlint:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs}"
      run: |
        if [ -n "{staged_files}" ]; then
          pnpm exec oxlint --fix {staged_files}
        fi
      stage_fixed: true
    oxfmt:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc,md}"
      exclude:
        - package.json
        - pnpm-lock.yaml
      run: |
        if [ -n "{staged_files}" ]; then
          pnpm exec oxfmt {staged_files}
        fi
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm run typecheck
    knip:
      run: pnpm run knip
